services:
  # Odoo ERP - Community Edition
  odoo:
    image: odoo:19.0
    container_name: ai-employee-odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      # Custom Odoo configuration
      - ./odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      # Odoo data directory
      - odoo-data:/var/lib/odoo
      # Custom addons
      - ./odoo/addons:/mnt/extra-addons:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8069/web/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: ai-employee-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Initialize database with odoo user
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  odoo-data:
  postgres-data:

networks:
  default:
    name: ai-employee-network
